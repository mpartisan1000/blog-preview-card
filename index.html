<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="blogpreview.css">  
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="main-container">
      <section class="cardsec">
        <img src="./assets/images/illustration-article.svg" alt="articleimg">        
        <div class="content">
          <div class="c1">Published 21 Dec 2023</div>
          <div class="c2"><a href="#" class="c2-link">HTML & CSS foundations</a></div>
          <div class="c3">Learning</div>
          <div class="c4">These languages are the backbone of every website, defining structure, content, and presentation.</div>
        </div>
        <div class="profname">
          <img src="./assets/images/image-avatar.webp" alt="avatar">
          <p>Greg Hooper</p>
        </div>
      </section>
      
      <footer class="site-footer">
        <p>
          Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
          Coded by <a href="#">Leroy Mends</a>.
        </p>
      </footer>
    </main>
  </body>
</html>
