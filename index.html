<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="./css/blogpreview.css">  
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="main-container">
      <div class="wrapper">
        <section class="blog-card">
          <div class="img-wrapper">
            <img src="./assets/images/illustration-article.svg" alt="article-image">
          </div>        
          <div class="txt-article">
            <h1 class="title"><a href="#" class="t-link">HTML & CSS foundations</a></h1>
            <small class="published-date">Published 21 Dec 2023</small>
            <p class="tag">Learning</p>
            <p class="summary">These languages are the backbone of every website, defining structure, content, and presentation.</p>
          </div>
          <div class="author-wrapper">
            <img src="./assets/images/image-avatar.webp" alt="greg-picture">
            <p>Greg Hooper</p>
          </div>
        </section>
      </div>
    </main>        
    <footer>
      <div class="footer-wrapper">
        <p>
          Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
          Coded by <a href="#">Leroy Mends</a>.
        </p>
      </div>
    </footer>
  </body>
</html>
